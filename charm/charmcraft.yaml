name: launchpad-ui

type: charm

base: ubuntu@24.04
platforms:
  amd64:

# (Required)
summary: SvelteKit front-end for Launchpad, deployed on Kubernetes.

# (Required)
description: |
  Kubernetes charm for Launchpad UI — a SvelteKit application compiled with
  adapter-node. Managed via the go-framework extension.

extensions:
  - go-framework

# Mapped to unprefixed env vars (charm.py sets configuration_prefix="")
# read by adapter-node to derive the request origin behind the ingress.
config:
  options:
    protocol-header:
      type: string
      default: x-forwarded-proto
      description: >
        Header adapter-node reads to determine the original request protocol
        (PROTOCOL_HEADER).
    host-header:
      type: string
      default: x-forwarded-host
      description: >
        Header adapter-node reads to determine the original request host
        (HOST_HEADER).
    origin:
      type: string
      description: >
        Public origin (scheme://host) adapter-node uses to build request URLs
        and validate same-origin POSTs (ORIGIN). Set to the external URL, e.g.
        https://staging.paddev.net. Pins the origin so the CSRF check does not
        rely on proxy headers, which behind the front proxy carry the internal
        host/scheme instead of the public one.
    main-launchpad-base-host:
      type: string
      default: https://launchpad.net
      description: >
        Base host used to reach the main Launchpad service
        (MAIN_LAUNCHPAD_BASE_HOST).
    main-launchpad-ip-address:
      type: string
      description: >
        Optional IP address override for the main Launchpad service
        (MAIN_LAUNCHPAD_IP_ADDRESS).
    main-launchpad-skip-tls-verify:
      type: boolean
      default: false
      description: >
        Skip TLS certificate verification when contacting the main Launchpad
        service (MAIN_LAUNCHPAD_SKIP_TLS_VERIFY).
    main-launchpad-cookie-name:
      type: string
      default: lp
      description: >
        Session cookie name used with the main Launchpad service
        (MAIN_LAUNCHPAD_COOKIE_NAME).

