<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    %sveltekit.head%
  </head>
  <!-- 
    At the moment, SvelteKit doesn't seem to be forking on link hover to preload data of remote queries that depend on the URL state. Investigate whether this is intended. If not maybe it's better to stick with load functions after all?
  -->
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
