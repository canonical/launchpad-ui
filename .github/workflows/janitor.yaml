name: Clean up old workflow runs

on:
  schedule:
    - cron: "0 0 * * *" # Daily at midnight UTC
  workflow_dispatch: {}

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    uses: canonical/launchpad-actions/.github/workflows/janitor.yaml@29acf6ef813a528b94ee87f3680ad844cde6ca8f # 29acf6ef813a528b94ee87f3680ad844cde6ca8f
    with:
      dry_run: false
      keep_workflows: "chromatic.yaml,publish.yaml,zizmor.yaml"
