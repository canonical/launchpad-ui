name: Publish
# Orchestrates rock build, charm pack, and Charmhub release.
# Pushes to main auto-publish on the edge channel.
#
# Required secrets:
#   CHARMHUB_TOKEN — charmcraft credentials (`charmcraft login --export`)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      channel:
        description: Charmhub channel
        type: choice
        options:
          - edge
          - stable
        default: edge

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rock:
    permissions:
      contents: read
      packages: write
    uses: canonical/launchpad-actions/.github/workflows/build-rock.yaml@aaf1bae484c97a4029b70906f8f2ce569b2da1f2 # aaf1bae484c97a4029b70906f8f2ce569b2da1f2
    with:
      commit_sha: ${{ github.sha }}
      runner_flavor: medium

  charm:
    uses: canonical/launchpad-actions/.github/workflows/build-charm.yaml@aaf1bae484c97a4029b70906f8f2ce569b2da1f2 # aaf1bae484c97a4029b70906f8f2ce569b2da1f2
    with:
      commit_sha: ${{ github.sha }}
      runner_flavor: medium

  release:
    needs: [rock, charm]
    permissions:
      contents: read
      packages: read
    uses: canonical/launchpad-actions/.github/workflows/release-charm.yaml@aaf1bae484c97a4029b70906f8f2ce569b2da1f2 # aaf1bae484c97a4029b70906f8f2ce569b2da1f2
    secrets: inherit # zizmor: ignore[secrets-inherit]
    with:
      charm_cache_hit: ${{ needs.charm.outputs.cache_hit }}
      skip_resource_upload: ${{ needs.rock.outputs.cache_hit == 'true' }}
      commit_sha: ${{ github.sha }}
      channel: ${{ inputs.channel || 'edge' }}
      charm_name: launchpad-ui
      resource_name: app-image

  terraform-bump-stg-ps7:
    needs: release
    # Only the stg Terraform repo exists today, and it tracks the edge channel.
    if: ${{ (inputs.channel || 'edge') == 'edge' }}
    permissions:
      contents: read
    uses: canonical/launchpad-actions/.github/workflows/terraform-bump-pr.yaml@aaf1bae484c97a4029b70906f8f2ce569b2da1f2 # aaf1bae484c97a4029b70906f8f2ce569b2da1f2
    secrets: inherit # zizmor: ignore[secrets-inherit]
    with:
      environment: stg
      app_name: launchpad-ui
      charm_revision: ${{ needs.release.outputs.charm_revision }}
      resource_revision: ${{ needs.release.outputs.resource_revision }}
