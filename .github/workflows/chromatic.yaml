name: "Chromatic"

on:
  push:
    branches:
      - "main"
  pull_request:

permissions:
  contents: read
  statuses: write

jobs:
  chromatic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - run: bun install

      - uses: chromaui/action@d92ea1ce501f70e8c34745b2c7888648150a368a # latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }} # zizmor: ignore[secrets-outside-env]
          autoAcceptChanges: ${{ github.ref_name == 'main' && 'main' || '' }}
          exitOnceUploaded: true
