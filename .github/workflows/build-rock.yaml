name: Build rock
# Builds a rock image via Launchpad remote build, then pushes it
# to ghcr.io/<owner>/<repo>:<commit-sha>.
#
# Required secret: ROCKCRAFT_LAUNCHPAD_CREDENTIALS
#   The full contents of ~/.local/share/rockcraft/launchpad-credentials,
#   an INI file created by an interactive `rockcraft remote-build` run:
#
#     [1]
#     consumer_key = ...
#     consumer_secret =
#     access_token = <token>
#     access_secret = <secret>
#
#   Paste the entire file as the secret value in
#   Settings -> Secrets and variables -> Actions.

on:
  workflow_call:
    inputs:
      commit_sha:
        description: Commit SHA to checkout and tag the GHCR image
        type: string
        required: false
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: build-rock-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_URL: ghcr.io/${{ github.repository }}:${{ inputs.commit_sha || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.commit_sha || github.sha }}
          persist-credentials: false
          fetch-depth: 0

      - name: Install rockcraft
        run: sudo snap install rockcraft --classic

      - name: Write Launchpad credentials
        env:
          ROCKCRAFT_LAUNCHPAD_CREDENTIALS: ${{ secrets.ROCKCRAFT_LAUNCHPAD_CREDENTIALS }}
        run: |
          mkdir -p ~/.local/share/rockcraft
          echo "$ROCKCRAFT_LAUNCHPAD_CREDENTIALS" > ~/.local/share/rockcraft/launchpad-credentials

      - name: Build rock (Launchpad remote build)
        shell: bash
        run: |
          set +e
          shopt -s nullglob

          cleanup() {
            touch rockcraft.done
            if [ -n "${LOG_STREAM_PID:-}" ]; then
              kill "$LOG_STREAM_PID" 2>/dev/null || true
              wait "$LOG_STREAM_PID" 2>/dev/null || true
            fi
          }
          trap cleanup INT TERM

          stream_launchpad_log() {
            local log_file token tail_pid

            while true; do
              local launchpad_logs=(rockcraft-launchpad-ui-*.txt)

              if [ "${#launchpad_logs[@]}" -gt 0 ]; then
                log_file="${launchpad_logs[0]}"
                printf '%s\n' "$log_file" > rockcraft-streamed-log.txt

                token="$(uuidgen)"
                echo "::group::Live Launchpad build log (${log_file})"
                echo "::stop-commands::${token}"

                tail --pid="$ROCKCRAFT_PID" -n +1 -F -- "$log_file" &
                tail_pid=$!
                wait "$tail_pid" || true

                echo "::${token}::"
                echo "::endgroup::"
                return 0
              fi

              [ -e rockcraft.done ] && return 0
              sleep 2
            done
          }

          print_log_group() {
            local log_file="$1"
            local token

            token="$(uuidgen)"
            echo "::group::Launchpad build log (${log_file})"
            echo "::stop-commands::${token}"
            cat -- "$log_file"
            echo "::${token}::"
            echo "::endgroup::"
          }

          (
            rockcraft remote-build \
              --launchpad-accept-public-upload \
              --launchpad-timeout=1800 2>&1 | tee rockcraft-remote-build.txt
            pipe_status=("${PIPESTATUS[@]}")
            printf '%s\n' "${pipe_status[0]}" > rockcraft.exit
            printf '%s\n' "${pipe_status[1]}" > tee.exit
            exit "${pipe_status[0]}"
          ) &
          ROCKCRAFT_PID=$!

          stream_launchpad_log &
          LOG_STREAM_PID=$!

          wait "$ROCKCRAFT_PID"
          PIPELINE_EXIT=$?

          touch rockcraft.done
          wait "$LOG_STREAM_PID" || true
          trap - INT TERM

          ROCKCRAFT_EXIT="$(cat rockcraft.exit 2>/dev/null || echo "$PIPELINE_EXIT")"
          TEE_EXIT="$(cat tee.exit 2>/dev/null || echo 1)"

          streamed_log=""
          if [ -f rockcraft-streamed-log.txt ]; then
            streamed_log="$(cat rockcraft-streamed-log.txt)"
          fi

          launchpad_logs=(rockcraft-launchpad-ui-*.txt)
          if [ "${#launchpad_logs[@]}" -eq 0 ]; then
            echo "::warning::No Launchpad build log files were written"
          elif [ -z "$streamed_log" ]; then
            for LOG_FILE in "${launchpad_logs[@]}"; do
              print_log_group "$LOG_FILE"
            done
          else
            for LOG_FILE in "${launchpad_logs[@]}"; do
              [ "$LOG_FILE" = "$streamed_log" ] && continue
              print_log_group "$LOG_FILE"
            done
          fi

          if [ "$ROCKCRAFT_EXIT" -ne 0 ]; then
            exit "$ROCKCRAFT_EXIT"
          fi
          exit "$TEE_EXIT"

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push rock to GHCR
        run: |
          rock_file=$(ls *.rock)
          rockcraft.skopeo --insecure-policy copy \
            "oci-archive:${rock_file}" \
            "docker://${IMAGE_URL}"

      - name: Upload rock artifacts
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rocks-${{ github.sha }}
          path: "*.rock"
          if-no-files-found: error

      - name: Prepare build logs for upload
        if: always()
        shell: bash
        run: |
          mkdir -p build-logs
          shopt -s nullglob
          logs=(rockcraft*.txt)

          if [ "${#logs[@]}" -eq 0 ]; then
            echo "No build logs to prepare"
            exit 0
          fi

          for LOG_FILE in "${logs[@]}"; do
            SAFE_NAME="${LOG_FILE//:/-}"
            cp -- "$LOG_FILE" "build-logs/${SAFE_NAME}"
          done

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-logs-${{ github.sha }}
          path: "build-logs/*.txt"
          if-no-files-found: ignore
